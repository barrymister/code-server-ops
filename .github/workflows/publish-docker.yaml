name: Publish Docker image

# Pushes ghcr.io/barrymister/code-server-ops on tags `v*`.
# The image tag matches the git tag without the leading `v` (e.g. v0.1.0 → :0.1.0),
# and is ALSO tagged :latest on stable releases and :alpha on prereleases.

on:
  push:
    tags: ["v*"]

# GITHUB_TOKEN needs write access to packages for ghcr pushes.
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          raw="${GITHUB_REF##refs/tags/v}"
          echo "version=$raw" >> "$GITHUB_OUTPUT"
          if [[ "$raw" == *-alpha* || "$raw" == *-beta* || "$raw" == *-rc* ]]; then
            echo "channel=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "channel=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/code-server-ops:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/code-server-ops:${{ steps.version.outputs.channel }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
